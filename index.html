<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Análise de Contratos com IA</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.sub{
color:#cbd5f5;
margin-bottom:30px;
}

.upload-box{
border:2px dashed #334155;
padding:40px;
border-radius:12px;
background:#020617;
}

input[type=file]{
display:none;
}

.upload-btn{
display:inline-block;
padding:16px 28px;
background:#2563eb;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.upload-btn:hover{
background:#1d4ed8;
}

.benefits{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

button{
margin-top:20px;
padding:16px 32px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<h1>Analise qualquer contrato em 30 segundos com IA</h1>

<p class="sub">
Descubra cláusulas abusivas antes de assinar qualquer contrato.
</p>

<div class="upload-box">

<label class="upload-btn">
Escolher Arquivo PDF
<input type="file" id="fileInput" accept=".pdf">
</label>

<div class="benefits">
⚡ Resultado em segundos <br>
🔒 100% confidencial <br>
📄 Compatível com qualquer contrato
</div>

<button onclick="enviarContrato()">
Analisar Contrato
</button>

</div>

</div>

<script>

async function enviarContrato(){

let file=document.getElementById("fileInput").files[0];

if(!file){
alert("Escolha um contrato PDF");
return;
}

let formData=new FormData();
formData.append("file",file);

let response=await fetch("SUA_EDGE_FUNCTION_AQUI",{
method:"POST",
body:formData
});

let data=await response.json();

alert("Análise concluída!");

}

</script>

</body>
</html>
